receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - "http://*"
            - "https://*"
  prometheus:
    config:
      scrape_configs:
        - job_name: 'prometheus'
          static_configs:
            - targets: ['prometheus:9090']
        - job_name: 'node_exporter'
          static_configs:
            - targets: ['node_exporter:9100']
        - job_name: 'blackbox'
          metrics_path: /probe
          params:
            module: [http_2xx]
          static_configs:
            - targets:
              - https://github.com/
              - https://www.wanikani.com/
          relabel_configs:
            - source_labels: [__address__]
              target_label: __param_target
            - source_labels: [__param_target]
              target_label: instance
            - target_label: __address__
              replacement: blackbox_exporter:9115
        - job_name: 'loki'
          static_configs:
            - targets: ['loki:3100']
        - job_name: 'pyroscope'
          static_configs:
            - targets: ['pyroscope:4040']
        - job_name: 'otel-collector'
          static_configs:
            - targets: ['localhost:8888']
  pprof/prometheus:
    endpoint: http://prometheus:9090/debug/pprof/profile?seconds=10
    collection_interval: 1m
  pprof/prometheus_heap:
    endpoint: http://prometheus:9090/debug/pprof/heap
    collection_interval: 1m
  pprof/prometheus_allocs:
    endpoint: http://prometheus:9090/debug/pprof/allocs
    collection_interval: 1m
  pprof/prometheus_goroutine:
    endpoint: http://prometheus:9090/debug/pprof/goroutine
    collection_interval: 1m
  pprof/alertmanager:
    endpoint: http://alertmanager:9093/debug/pprof/profile?seconds=10
    collection_interval: 1m
  pprof/alertmanager_heap:
    endpoint: http://alertmanager:9093/debug/pprof/heap
    collection_interval: 1m
  pprof/alertmanager_allocs:
    endpoint: http://alertmanager:9093/debug/pprof/allocs
    collection_interval: 1m
  pprof/alertmanager_goroutine:
    endpoint: http://alertmanager:9093/debug/pprof/goroutine
    collection_interval: 1m
  pprof/grafana:
    endpoint: http://grafana:6060/debug/pprof/profile?seconds=10
    collection_interval: 1m
  pprof/grafana_heap:
    endpoint: http://grafana:6060/debug/pprof/heap
    collection_interval: 1m
  pprof/grafana_allocs:
    endpoint: http://grafana:6060/debug/pprof/allocs
    collection_interval: 1m
  pprof/grafana_goroutine:
    endpoint: http://grafana:6060/debug/pprof/goroutine
    collection_interval: 1m
  pprof/otel-collector:
    endpoint: http://localhost:1888/debug/pprof/profile?seconds=10
    collection_interval: 1m
  pprof/otel-collector_heap:
    endpoint: http://localhost:1888/debug/pprof/heap
    collection_interval: 1m
  pprof/otel-collector_allocs:
    endpoint: http://localhost:1888/debug/pprof/allocs
    collection_interval: 1m
  pprof/otel-collector_goroutine:
    endpoint: http://localhost:1888/debug/pprof/goroutine
    collection_interval: 1m
  receiver_creator:
    watch_observers: [docker_observer]
    receivers:
      filelog/docker:
        rule: type == "container" and port == 0 and labels["com.docker.compose.project"] == "home-monitoring"
        config:
          include:
            - /var/lib/docker/containers/`container_id`/*-json.log
          include_file_path: true
          start_at: end
          operators:
            - type: container
              format: docker
              add_metadata_from_filepath: false
        resource_attributes:
          container.id: '`container_id`'
          container.name: '`name`'
          container.image.name: '`image`'
          docker.compose.project: '`labels["com.docker.compose.project"]`'
          docker.compose.service: '`labels["com.docker.compose.service"]`'

exporters:
  debug:
    verbosity: detailed
  otlp_http/grafana_cloud:
    endpoint: https://otlp-gateway-prod-sa-east-1.grafana.net/otlp
    auth:
      authenticator: basicauth/grafana_cloud
  otlp_http/prometheus:
    endpoint: http://prometheus:9090/api/v1/otlp
  otlp_http/loki:
    endpoint: http://loki:3100/otlp
  otlp_http/tempo:
    endpoint: http://tempo:4318
  otlp_http/pyroscope:
    endpoint: http://pyroscope:4040

processors:
  batch:
  resource/profiles_prometheus:
    attributes:
      - key: service.name
        value: prometheus
        action: upsert
      - key: service.namespace
        value: home-monitoring
        action: upsert
  resource/profiles_alertmanager:
    attributes:
      - key: service.name
        value: alertmanager
        action: upsert
      - key: service.namespace
        value: home-monitoring
        action: upsert
  resource/profiles_grafana:
    attributes:
      - key: service.name
        value: grafana
        action: upsert
      - key: service.namespace
        value: home-monitoring
        action: upsert
  resource/profiles_otel_collector:
    attributes:
      - key: service.name
        value: otel-collector
        action: upsert
      - key: service.namespace
        value: home-monitoring
        action: upsert

extensions:
  docker_observer:
    endpoint: unix:///var/run/docker.sock
    include_all_containers: true
  basicauth/grafana_cloud:
    client_auth:
      username_file: /run/secrets/grafana_cloud_instance_id
      password_file: /run/secrets/grafana_cloud_api_token
  health_check:
  pprof:
    endpoint: :1888
  zpages:
    endpoint: :55679

service:
  extensions: [docker_observer, basicauth/grafana_cloud, pprof, zpages, health_check]
  telemetry:
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
  pipelines:
    metrics:
      receivers: [otlp, prometheus]
      processors: [batch]
      exporters: [otlp_http/grafana_cloud, otlp_http/prometheus]
    logs:
      receivers: [otlp, receiver_creator]
      processors: [batch]
      exporters: [otlp_http/loki, otlp_http/grafana_cloud]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_http/grafana_cloud, otlp_http/tempo]
    profiles/prometheus:
      receivers: [pprof/prometheus, pprof/prometheus_heap, pprof/prometheus_allocs, pprof/prometheus_goroutine]
      processors: [resource/profiles_prometheus]
      exporters: [otlp_http/pyroscope, otlp_http/grafana_cloud]
    profiles/alertmanager:
      receivers: [pprof/alertmanager, pprof/alertmanager_heap, pprof/alertmanager_allocs, pprof/alertmanager_goroutine]
      processors: [resource/profiles_alertmanager]
      exporters: [otlp_http/pyroscope, otlp_http/grafana_cloud]
    profiles/grafana:
      receivers: [pprof/grafana, pprof/grafana_heap, pprof/grafana_allocs, pprof/grafana_goroutine]
      processors: [resource/profiles_grafana]
      exporters: [otlp_http/pyroscope, otlp_http/grafana_cloud]
    profiles/otel-collector:
      receivers: [pprof/otel-collector, pprof/otel-collector_heap, pprof/otel-collector_allocs, pprof/otel-collector_goroutine]
      processors: [resource/profiles_otel_collector]
      exporters: [otlp_http/pyroscope, otlp_http/grafana_cloud]
