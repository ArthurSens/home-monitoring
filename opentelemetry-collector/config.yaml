receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - "http://*"
            - "https://*"
  prometheus:
    config:
      scrape_configs:
        - job_name: 'prometheus'
          static_configs:
            - targets: ['prometheus:9090']
        - job_name: 'grafana'
          static_configs:
            - targets: ['grafana:3000']
        - job_name: 'alertmanager'
          static_configs:
            - targets: ['alertmanager:9093']
        - job_name: 'node_exporter'
          static_configs:
            - targets: ['node_exporter:9100']
        - job_name: 'garmin_exporter'
          static_configs:
            - targets: ['garmin_exporter:10045']
        - job_name: 'blackbox_exporter'
          metrics_path: /probe
          params:
            module: [http_2xx]
          static_configs:
            - targets:
              - https://github.com/
              - https://www.wanikani.com/
          relabel_configs:
            - source_labels: [__address__]
              target_label: __param_target
            - source_labels: [__param_target]
              target_label: instance
            - target_label: __address__
              replacement: blackbox_exporter:9115
        - job_name: 'loki'
          static_configs:
            - targets: ['loki:3100']
        - job_name: 'tempo'
          static_configs:
            - targets: ['tempo:3200']
        - job_name: 'pyroscope'
          static_configs:
            - targets: ['pyroscope:4040']
        - job_name: 'otel-collector'
          static_configs:
            - targets: ['localhost:8888']
  pprof/prometheus:
    remote:
      endpoint: http://prometheus:9090/debug/pprof/profile?seconds=10
      collection_interval: 1m
  pprof/prometheus_heap:
    remote:
      endpoint: http://prometheus:9090/debug/pprof/heap
      collection_interval: 1m
  pprof/prometheus_allocs:
    remote:
      endpoint: http://prometheus:9090/debug/pprof/allocs
      collection_interval: 1m
  pprof/prometheus_goroutine:
    remote:
      endpoint: http://prometheus:9090/debug/pprof/goroutine
      collection_interval: 1m
  pprof/alertmanager:
    remote:
      endpoint: http://alertmanager:9093/debug/pprof/profile?seconds=10
      collection_interval: 1m
  pprof/alertmanager_heap:
    remote:
      endpoint: http://alertmanager:9093/debug/pprof/heap
      collection_interval: 1m
  pprof/alertmanager_allocs:
    remote:
      endpoint: http://alertmanager:9093/debug/pprof/allocs
      collection_interval: 1m
  pprof/alertmanager_goroutine:
    remote:
      endpoint: http://alertmanager:9093/debug/pprof/goroutine
      collection_interval: 1m
  pprof/grafana:
    remote:
      endpoint: http://grafana:6060/debug/pprof/profile?seconds=10
      collection_interval: 1m
  pprof/grafana_heap:
    remote:
      endpoint: http://grafana:6060/debug/pprof/heap
      collection_interval: 1m
  pprof/grafana_allocs:
    remote:
      endpoint: http://grafana:6060/debug/pprof/allocs
      collection_interval: 1m
  pprof/grafana_goroutine:
    remote:
      endpoint: http://grafana:6060/debug/pprof/goroutine
      collection_interval: 1m
  pprof/otel-collector:
    self:
      collection_interval: 1m
  pprof/otel-collector_heap:
    remote:
      endpoint: http://localhost:1888/debug/pprof/heap
      collection_interval: 1m
  pprof/otel-collector_allocs:
    remote:
      endpoint: http://localhost:1888/debug/pprof/allocs
      collection_interval: 1m
  pprof/otel-collector_goroutine:
    remote:
      endpoint: http://localhost:1888/debug/pprof/goroutine
      collection_interval: 1m
  pprof/node_exporter:
    remote:
      endpoint: http://node_exporter:9100/debug/pprof/profile?seconds=10
      collection_interval: 1m
  pprof/node_exporter_heap:
    remote:
      endpoint: http://node_exporter:9100/debug/pprof/heap
      collection_interval: 1m
  pprof/node_exporter_allocs:
    remote:
      endpoint: http://node_exporter:9100/debug/pprof/allocs
      collection_interval: 1m
  pprof/node_exporter_goroutine:
    remote:
      endpoint: http://node_exporter:9100/debug/pprof/goroutine
      collection_interval: 1m
  pprof/blackbox_exporter:
    remote:
      endpoint: http://blackbox_exporter:9115/debug/pprof/profile?seconds=10
      collection_interval: 1m
  pprof/blackbox_exporter_heap:
    remote:
      endpoint: http://blackbox_exporter:9115/debug/pprof/heap
      collection_interval: 1m
  pprof/blackbox_exporter_allocs:
    remote:
      endpoint: http://blackbox_exporter:9115/debug/pprof/allocs
      collection_interval: 1m
  pprof/blackbox_exporter_goroutine:
    remote:
      endpoint: http://blackbox_exporter:9115/debug/pprof/goroutine
      collection_interval: 1m
  pprof/garmin_exporter:
    remote:
      endpoint: http://garmin_exporter:10045/debug/pprof/profile?seconds=10
      collection_interval: 1m
  pprof/garmin_exporter_heap:
    remote:
      endpoint: http://garmin_exporter:10045/debug/pprof/heap
      collection_interval: 1m
  pprof/garmin_exporter_allocs:
    remote:
      endpoint: http://garmin_exporter:10045/debug/pprof/allocs
      collection_interval: 1m
  pprof/garmin_exporter_goroutine:
    remote:
      endpoint: http://garmin_exporter:10045/debug/pprof/goroutine
      collection_interval: 1m
  pprof/loki:
    remote:
      endpoint: http://loki:3100/debug/pprof/profile?seconds=10
      collection_interval: 1m
  pprof/loki_heap:
    remote:
      endpoint: http://loki:3100/debug/pprof/heap
      collection_interval: 1m
  pprof/loki_allocs:
    remote:
      endpoint: http://loki:3100/debug/pprof/allocs
      collection_interval: 1m
  pprof/loki_goroutine:
    remote:
      endpoint: http://loki:3100/debug/pprof/goroutine
      collection_interval: 1m
  pprof/tempo:
    remote:
      endpoint: http://tempo:3200/debug/pprof/profile?seconds=10
      collection_interval: 1m
  pprof/tempo_heap:
    remote:
      endpoint: http://tempo:3200/debug/pprof/heap
      collection_interval: 1m
  pprof/tempo_allocs:
    remote:
      endpoint: http://tempo:3200/debug/pprof/allocs
      collection_interval: 1m
  pprof/tempo_goroutine:
    remote:
      endpoint: http://tempo:3200/debug/pprof/goroutine
      collection_interval: 1m
  pprof/pyroscope:
    remote:
      endpoint: http://pyroscope:4040/debug/pprof/profile?seconds=10
      collection_interval: 1m
  pprof/pyroscope_heap:
    remote:
      endpoint: http://pyroscope:4040/debug/pprof/heap
      collection_interval: 1m
  pprof/pyroscope_allocs:
    remote:
      endpoint: http://pyroscope:4040/debug/pprof/allocs
      collection_interval: 1m
  pprof/pyroscope_goroutine:
    remote:
      endpoint: http://pyroscope:4040/debug/pprof/goroutine
      collection_interval: 1m
  receiver_creator:
    watch_observers: [docker_observer]
    receivers:
      filelog/docker:
        rule: type == "container" and endpoint == host and labels["com.docker.compose.project"] == "home-monitoring"
        config:
          include:
            - /var/lib/docker/containers/`container_id`/*-json.log
          include_file_path: true
          start_at: end
          operators:
            - type: container
              format: docker
              add_metadata_from_filepath: false
        resource_attributes:
          container.id: '`container_id`'
          container.name: '`name`'
          container.image.name: '`image`'
          docker.compose.project: '`labels["com.docker.compose.project"]`'
          docker.compose.service: '`labels["com.docker.compose.service"]`'
          service.name: '`labels["com.docker.compose.service"]`'
          service.instance.id: '`name`'

exporters:
  debug:
    verbosity: detailed
  otlp_http/grafana_cloud:
    endpoint: https://otlp-gateway-prod-sa-east-1.grafana.net/otlp
    auth:
      authenticator: basicauth/grafana_cloud
  otlp_http/prometheus:
    endpoint: http://prometheus:9090/api/v1/otlp
  otlp_http/loki:
    endpoint: http://loki:3100/otlp
  otlp_http/tempo:
    endpoint: http://tempo:4318
  otlp_http/pyroscope:
    endpoint: http://pyroscope:4040

processors:
  batch:
  resource/home_monitoring:
    attributes:
      - key: grafana.host.id
        value: homelab
        action: insert
      - key: service.namespace
        value: home-monitoring
        action: insert
      - key: deployment.environment
        value: homelab
        action: insert
      - key: deployment.environment.name
        value: homelab
        action: insert
  resource/profiles_prometheus:
    attributes:
      - key: service.name
        value: prometheus
        action: upsert
      - key: service.instance.id
        value: prometheus
        action: upsert
      - key: service.namespace
        value: home-monitoring
        action: upsert
  resource/profiles_alertmanager:
    attributes:
      - key: service.name
        value: alertmanager
        action: upsert
      - key: service.instance.id
        value: alertmanager
        action: upsert
      - key: service.namespace
        value: home-monitoring
        action: upsert
  resource/profiles_grafana:
    attributes:
      - key: service.name
        value: grafana
        action: upsert
      - key: service.instance.id
        value: grafana
        action: upsert
      - key: service.namespace
        value: home-monitoring
        action: upsert
  resource/profiles_otel_collector:
    attributes:
      - key: service.name
        value: otel-collector
        action: upsert
      - key: service.instance.id
        value: otel-collector
        action: upsert
      - key: service.namespace
        value: home-monitoring
        action: upsert
  resource/profiles_node_exporter:
    attributes:
      - key: service.name
        value: node_exporter
        action: upsert
      - key: service.instance.id
        value: node_exporter
        action: upsert
      - key: service.namespace
        value: home-monitoring
        action: upsert
  resource/profiles_blackbox_exporter:
    attributes:
      - key: service.name
        value: blackbox_exporter
        action: upsert
      - key: service.instance.id
        value: blackbox_exporter
        action: upsert
      - key: service.namespace
        value: home-monitoring
        action: upsert
  resource/profiles_garmin_exporter:
    attributes:
      - key: service.name
        value: garmin_exporter
        action: upsert
      - key: service.instance.id
        value: garmin_exporter
        action: upsert
      - key: service.namespace
        value: home-monitoring
        action: upsert
  resource/profiles_loki:
    attributes:
      - key: service.name
        value: loki
        action: upsert
      - key: service.instance.id
        value: loki
        action: upsert
      - key: service.namespace
        value: home-monitoring
        action: upsert
  resource/profiles_tempo:
    attributes:
      - key: service.name
        value: tempo
        action: upsert
      - key: service.instance.id
        value: tempo
        action: upsert
      - key: service.namespace
        value: home-monitoring
        action: upsert
  resource/profiles_pyroscope:
    attributes:
      - key: service.name
        value: pyroscope
        action: upsert
      - key: service.instance.id
        value: pyroscope
        action: upsert
      - key: service.namespace
        value: home-monitoring
        action: upsert

extensions:
  docker_observer:
    endpoint: unix:///var/run/docker.sock
    include_all_containers: true
  basicauth/grafana_cloud:
    client_auth:
      username_file: /run/secrets/grafana_cloud_instance_id
      password_file: /run/secrets/grafana_cloud_api_token
  health_check:
  pprof:
    endpoint: :1888
  zpages:
    endpoint: :55679

service:
  extensions: [docker_observer, basicauth/grafana_cloud, pprof, zpages, health_check]
  telemetry:
    resource:
      service.name: otel-collector
      service.namespace: home-monitoring
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
    traces:
      processors:
        - batch:
            exporter:
              otlp:
                protocol: http/protobuf
                endpoint: http://127.0.0.1:4318
  pipelines:
    metrics:
      receivers: [otlp, prometheus]
      processors: [resource/home_monitoring, batch]
      exporters: [otlp_http/grafana_cloud, otlp_http/prometheus]
    logs:
      receivers: [otlp, receiver_creator]
      processors: [resource/home_monitoring, batch]
      exporters: [otlp_http/loki, otlp_http/grafana_cloud]
    traces:
      receivers: [otlp]
      processors: [resource/home_monitoring, batch]
      exporters: [otlp_http/grafana_cloud, otlp_http/tempo]
    # Grafana Cloud's OTLP gateway does not support OTLP profiles yet.
    # Keep profiles local in Pyroscope until Cloud Profiles supports OTLP ingest.
    profiles/prometheus:
      receivers: [pprof/prometheus, pprof/prometheus_heap, pprof/prometheus_allocs, pprof/prometheus_goroutine]
      processors: [resource/home_monitoring, resource/profiles_prometheus]
      exporters: [otlp_http/pyroscope]
    profiles/alertmanager:
      receivers: [pprof/alertmanager, pprof/alertmanager_heap, pprof/alertmanager_allocs, pprof/alertmanager_goroutine]
      processors: [resource/home_monitoring, resource/profiles_alertmanager]
      exporters: [otlp_http/pyroscope]
    profiles/grafana:
      receivers: [pprof/grafana, pprof/grafana_heap, pprof/grafana_allocs, pprof/grafana_goroutine]
      processors: [resource/home_monitoring, resource/profiles_grafana]
      exporters: [otlp_http/pyroscope]
    profiles/otel-collector:
      receivers: [pprof/otel-collector, pprof/otel-collector_heap, pprof/otel-collector_allocs, pprof/otel-collector_goroutine]
      processors: [resource/home_monitoring, resource/profiles_otel_collector]
      exporters: [otlp_http/pyroscope]
    profiles/node_exporter:
      receivers: [pprof/node_exporter, pprof/node_exporter_heap, pprof/node_exporter_allocs, pprof/node_exporter_goroutine]
      processors: [resource/home_monitoring, resource/profiles_node_exporter]
      exporters: [otlp_http/pyroscope]
    profiles/blackbox_exporter:
      receivers: [pprof/blackbox_exporter, pprof/blackbox_exporter_heap, pprof/blackbox_exporter_allocs, pprof/blackbox_exporter_goroutine]
      processors: [resource/home_monitoring, resource/profiles_blackbox_exporter]
      exporters: [otlp_http/pyroscope]
    profiles/garmin_exporter:
      receivers: [pprof/garmin_exporter, pprof/garmin_exporter_heap, pprof/garmin_exporter_allocs, pprof/garmin_exporter_goroutine]
      processors: [resource/home_monitoring, resource/profiles_garmin_exporter]
      exporters: [otlp_http/pyroscope]
    profiles/loki:
      receivers: [pprof/loki, pprof/loki_heap, pprof/loki_allocs, pprof/loki_goroutine]
      processors: [resource/home_monitoring, resource/profiles_loki]
      exporters: [otlp_http/pyroscope]
    profiles/tempo:
      receivers: [pprof/tempo, pprof/tempo_heap, pprof/tempo_allocs, pprof/tempo_goroutine]
      processors: [resource/home_monitoring, resource/profiles_tempo]
      exporters: [otlp_http/pyroscope]
    profiles/pyroscope:
      receivers: [pprof/pyroscope, pprof/pyroscope_heap, pprof/pyroscope_allocs, pprof/pyroscope_goroutine]
      processors: [resource/home_monitoring, resource/profiles_pyroscope]
      exporters: [otlp_http/pyroscope]
