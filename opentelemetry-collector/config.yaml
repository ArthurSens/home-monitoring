receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - "http://*"
            - "https://*"
  prometheus:
    config:
      scrape_configs:
        - job_name: 'prometheus'
          static_configs:
            - targets: ['prometheus:9090']
        - job_name: 'node_exporter'
          static_configs:
            - targets: ['node_exporter:9100']
        - job_name: 'blackbox'
          metrics_path: /probe
          params:
            module: [http_2xx]
          static_configs:
            - targets:
              - https://github.com/
              - https://www.wanikani.com/
          relabel_configs:
            - source_labels: [__address__]
              target_label: __param_target
            - source_labels: [__param_target]
              target_label: instance
            - target_label: __address__
              replacement: blackbox_exporter:9115
        - job_name: 'loki'
          static_configs:
            - targets: ['loki:3100']
        - job_name: 'otel-collector'
          static_configs:
            - targets: ['localhost:8888']
  receiver_creator:
    watch_observers: [docker_observer]
    receivers:
      filelog/docker:
        rule: type == "container" and port == 0 and labels["com.docker.compose.project"] == "home-monitoring"
        config:
          include:
            - /var/lib/docker/containers/`container_id`/*-json.log
          include_file_path: true
          start_at: end
          operators:
            - type: container
              format: docker
              add_metadata_from_filepath: false
        resource_attributes:
          container.id: '`container_id`'
          container.name: '`name`'
          container.image.name: '`image`'
          docker.compose.project: '`labels["com.docker.compose.project"]`'
          docker.compose.service: '`labels["com.docker.compose.service"]`'

exporters:
  debug:
    verbosity: detailed
  otlp_http/grafana_cloud:
    endpoint: https://otlp-gateway-prod-sa-east-1.grafana.net/otlp
    auth:
      authenticator: basicauth/grafana_cloud
  otlp_http/prometheus:
    endpoint: http://prometheus:9090/api/v1/otlp
  otlp_http/loki:
    endpoint: http://loki:3100/otlp

processors:
  batch:

extensions:
  docker_observer:
    endpoint: unix:///var/run/docker.sock
    include_all_containers: true
  basicauth/grafana_cloud:
    client_auth:
      username_file: /run/secrets/grafana_cloud_instance_id
      password_file: /run/secrets/grafana_cloud_api_token
  health_check:
  pprof:
    endpoint: :1888
  zpages:
    endpoint: :55679

service:
  extensions: [docker_observer, basicauth/grafana_cloud, pprof, zpages, health_check]
  telemetry:
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
  pipelines:
    metrics:
      receivers: [otlp, prometheus]
      processors: [batch]
      exporters: [otlp_http/grafana_cloud, otlp_http/prometheus]
    logs:
      receivers: [otlp, receiver_creator]
      processors: [batch]
      exporters: [otlp_http/loki]
