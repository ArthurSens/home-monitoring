name: Dashboard JSON

on:
  pull_request:
    paths:
      - grafana/provisioning/dashboards/**/*.json
      - scripts/validate-dashboard-json.py
      - .github/workflows/dashboard-json.yml
  push:
    branches:
      - master
    paths:
      - grafana/provisioning/dashboards/**/*.json
      - scripts/validate-dashboard-json.py
      - .github/workflows/dashboard-json.yml

permissions:
  contents: read

jobs:
  validate:
    name: Validate dashboard JSON
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate dashboard validator syntax
        run: python3 -m py_compile scripts/validate-dashboard-json.py

      - name: Validate dashboard JSON files
        run: python3 scripts/validate-dashboard-json.py
