name: Local Stack

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  verify:
    name: Verify local stack
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Create local placeholder secret files
        run: |
          mkdir -p secrets
          printf 'local-ci-placeholder\n' > secrets/grafana-cloud-instance-id
          printf 'local-ci-placeholder\n' > secrets/grafana-cloud-api-token

      - name: Prepare local storage directories
        run: |
          mkdir -p prometheus/storage tempo/storage pyroscope/storage
          chmod -R 777 prometheus/storage tempo/storage pyroscope/storage

      - name: Validate verification script
        run: bash -n scripts/verify-local-stack.sh

      - name: Verify local stack
        run: scripts/verify-local-stack.sh --timeout 900

      - name: Show stack diagnostics on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --no-color --tail=300

      - name: Stop stack
        if: always()
        run: docker compose down --volumes --remove-orphans
