secrets:
  grafana_cloud_instance_id:
    file: ./secrets/grafana-cloud-instance-id
  grafana_cloud_api_token:
    file: ./secrets/grafana-cloud-api-token
  grafana_admin_password:
    file: ./secrets/grafana-admin-password

services:
  prometheus:
    image: prom/prometheus:v3.13.1@sha256:3c42b892cf723fa54d2f262c37a0e1f80aa8c8ddb1da7b9b0df9455a35a7f893
    restart: always # To re-read the configuration file
    user: "1000:1000"
    environment:
      - OTEL_SERVICE_NAME=prometheus
    ports:
      - 81:9090
    volumes: 
      - ./prometheus/rules:/etc/prometheus/rules
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/storage:/prometheus
    command: 
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-admin-api 
      - --web.enable-lifecycle
      - --storage.tsdb.retention.time=2d
      - --web.enable-remote-write-receiver
      - --web.enable-otlp-receiver
      - --enable-feature=created-timestamp-zero-ingestion,promql-experimental-functions
    depends_on:
      - otel-collector


  grafana:
    image: grafana/grafana:13.1.1@sha256:1c1bd67c54c5fcf6e759897852b5a584191bd6796e8d328a5ace457799801261
    user: "1000:1000"
    ports: 
      - 82:3000
    environment: 
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD__FILE=/run/secrets/grafana_admin_password
      - GF_PLUGINS_PREINSTALL=grafana-assistant-app
      - GF_SERVER_ROOT_URL=http://localhost:82/
      - OTEL_SERVICE_NAME=grafana
      - GF_TRACING_OPENTELEMETRY_OTLP_ADDRESS=otel-collector:4317
      - GF_TRACING_OPENTELEMETRY_OTLP_PROPAGATION=w3c
      - GF_DIAGNOSTICS_PROFILING_ENABLED=true
      - GF_DIAGNOSTICS_PROFILING_ADDR=0.0.0.0
      - GF_DIAGNOSTICS_PROFILING_PORT=6060
    volumes: 
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/storage:/var/lib/grafana
    secrets:
      - grafana_admin_password
    depends_on:
      - loki
      - otel-collector
      - pyroscope


  alertmanager:
    image: prom/alertmanager:v0.33.1@sha256:9e082985f56f4c8c9f724e18f2288c6708f472e56a5286b8863d080434ea065d
    environment:
      - OTEL_SERVICE_NAME=alertmanager
    ports: 
      - 83:9093
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    volumes: 
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    depends_on:
      - otel-collector


  node_exporter:
    privileged: true
    image: prom/node-exporter:v1.12.1@sha256:1b4e4438faca4dd7e001dd445d161a4a2091b0fededa84093b3a8dfeae1f1be0
    ports: 
      - "9100:9100"

  garmin_exporter:
    image: ghcr.io/barnes-c/garmin_exporter:1.1.1@sha256:49952d346cb0a2ce13e661c0a849ae5511dee7de2108caeca7f73bf4516d5c83
    restart: unless-stopped
    env_file:
      - ./secrets/garmin.env
    command:
      - --token-file=/data/garmin_token.json
      - --cache.ttl=10m
    volumes:
      - garmin_data:/data

  blackbox_exporter: 
    image: prom/blackbox-exporter:v0.28.0@sha256:e753ff9f3fc458d02cca5eddab5a77e1c175eee484a8925ac7d524f04366c2fc

  loki:
    image: grafana/loki:3.7.2@sha256:191d4fdfb7264f16989f0a57f320872620a5a7c2ceeec6229212c4190ec49b86
    command: 
      - --config.file=/etc/loki/config.yaml
    volumes:
      - ./loki/config.yaml:/etc/loki/config.yaml
      - ./loki/storage:/loki
    ports:
      - "3100:3100"

  tempo:
    image: grafana/tempo:3.0.2@sha256:cda87c212d8c584dc0b89e337e7ed648a5100feb657e5d528480ee4fa03dbbe3
    command:
      - --config.file=/etc/tempo/config.yaml
    volumes:
      - ./tempo/config.yaml:/etc/tempo/config.yaml
      - ./tempo/storage:/var/tempo
    ports:
      - "3200:3200"

  pyroscope:
    image: grafana/pyroscope:2.1.1@sha256:c8ad9891fc8562c794c946883c8324b7e48f4eda58d243387c7b6254f9f061fb
    command:
      - --distributor.ingestion-rate-limit-mb=32
      - --distributor.ingestion-burst-size-mb=16
      - --self-profiling.disable-push=true
      - server
    volumes:
      - ./pyroscope/storage:/var/lib/pyroscope
    ports:
      - "4040:4040"

  otel-collector:
    image: home-monitoring/otel-collector:0.152.1
    build:
      context: .
      dockerfile: opentelemetry-collector/Dockerfile
    user: "0:0"
    restart: always # To re-read the configuration file
    command: ["--config=/etc/otel-collector-config.yaml", "--feature-gates=service.profilesSupport"]
    volumes:
      - ./opentelemetry-collector/config.yaml:/etc/otel-collector-config.yaml
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    secrets:
      - grafana_cloud_instance_id
      - grafana_cloud_api_token
    depends_on:
      - garmin_exporter
      - loki
      - tempo
      - pyroscope

volumes:
  garmin_data:
